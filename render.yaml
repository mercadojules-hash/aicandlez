services:
  # ── API Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: apex-trader-api
    env: node
    region: oregon
    plan: starter
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/api-server run build
    startCommand: >
      pnpm --filter @workspace/api-server run migrate &&
      pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: apex-trader-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: WEBHOOK_BASE_URL
        value: https://api.apexdigital.design
      - key: ALLOWED_ORIGINS
        value: https://app.apexdigital.design,https://apexdigital.design

  # ── Dashboard Frontend (static) ───────────────────────────────────────────────
  - type: web
    name: apex-trader-dashboard
    env: static
    region: oregon
    plan: starter
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/trading-dashboard run build
    staticPublishPath: artifacts/trading-dashboard/dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.apexdigital.design

databases:
  - name: apex-trader-db
    plan: starter
    region: oregon
