services:
  # ── API Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: aicandlez-api
    env: node
    region: oregon
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/api-server run build
    startCommand: >
      pnpm --filter @workspace/api-server run migrate &&
      pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aicandlez-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hello@aicandlez.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: CRYPTOCOM_API_KEY
        sync: false
      - key: CRYPTOCOM_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://aicandlez.com,https://www.aicandlez.com,https://app.aicandlez.com,https://trade.aicandlez.com,https://admintrade.aicandlez.com,https://dashboard.aicandlez.com,https://aicandlez-dashboard.onrender.com,https://aicandlez-trade.onrender.com,https://aicandlez-admintrade.onrender.com,https://aicandlez-app.onrender.com
      - key: EXCHANGE_LIVE_ENABLED
        value: "false"
      # Task #162 Phase B: Stripe return host fallback for the API service.
      # Per-request Origin header takes precedence when allow-listed; this
      # env is the canonical fallback when no Origin is supplied (ops scripts,
      # CLI, webhooks). MUST live on the API service (not the PWA), since
      # api-server is the one that constructs success/cancel URLs.
      - key: CUSTOMER_APP_BASE_URL
        value: https://app.aicandlez.com

  # ── Customer Desktop Terminal — trade.aicandlez.com ──────────────────────────
  # The customer-facing institutional desktop workstation. Served by the
  # trading-dashboard build with BASE_PATH=/ so /portal is the customer
  # default landing. Non-admin signed-in users land here. Admins who sign
  # in here are redirected to the admin host (admintrade.aicandlez.com).
  - type: web
    name: aicandlez-trade
    env: static
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/trading-dashboard run build
    staticPublishPath: artifacts/trading-dashboard/dist/public
    autoDeploy: true
    domains:
      - trade.aicandlez.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.aicandlez.com
      - key: VITE_WS_URL
        value: wss://api.aicandlez.com/ws
      - key: VITE_DEFAULT_LANDING
        value: /portal

  # ── Operator / Admin Workstation — admintrade.aicandlez.com ──────────────────
  # Same trading-dashboard codebase, deployed as a separate Render service
  # so the admin host can have stricter security headers / different
  # default landing (/command). Only users with role=admin|super-admin
  # may reach operator-only routes; non-admins hitting this host still
  # get redirected to /portal.
  - type: web
    name: aicandlez-admintrade
    env: static
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/trading-dashboard run build
    staticPublishPath: artifacts/trading-dashboard/dist/public
    autoDeploy: true
    domains:
      - admintrade.aicandlez.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.aicandlez.com
      - key: VITE_WS_URL
        value: wss://api.aicandlez.com/ws
      - key: VITE_DEFAULT_LANDING
        value: /command
      # Task #162 Phase C: non-admin users hitting this host get bounced
      # cross-host to the customer portal (never see operator chrome).
      - key: VITE_CUSTOMER_PORTAL_URL
        value: https://trade.aicandlez.com/portal

  # ── Legacy dashboard.aicandlez.com (preserve during migration) ───────────────
  # Same build; will be retired once trade./admintrade. cutover is verified.
  - type: web
    name: aicandlez-dashboard
    env: static
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/trading-dashboard run build
    staticPublishPath: artifacts/trading-dashboard/dist/public
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.aicandlez.com
      - key: VITE_WS_URL
        value: wss://api.aicandlez.com/ws

  # ── Mobile PWA (static) ──────────────────────────────────────────────────────
  - type: web
    name: aicandlez-app
    env: static
    # Publish path is the Vite outDir resolved from repo root.
    # Vite config: artifacts/aicandlez-app/vite.config.ts → build.outDir = "dist"
    # Therefore final artifact location = artifacts/aicandlez-app/dist
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/aicandlez-app run build
    staticPublishPath: artifacts/aicandlez-app/dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.aicandlez.com
      # Cross-app target for PWA /portal redirect — MUST point at the
      # trading-dashboard customer host, NEVER back at this PWA's own host
      # (would self-loop into FullPageLoader). Phase A of Task #162.
      - key: VITE_TRADING_DASHBOARD_URL
        value: https://trade.aicandlez.com

  # ── Marketing Landing (static) ───────────────────────────────────────────────
  - type: web
    name: aicandlez-landing
    env: static
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/landing run build
    staticPublishPath: artifacts/landing/dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_URL
        value: https://app.aicandlez.com
      # Optional: lets landing CTAs deep-link to the customer desktop terminal.
      # Falls back to https://trade.aicandlez.com if unset. Task #162 Phase D.
      - key: VITE_TRADE_URL
        value: https://trade.aicandlez.com

databases:
  - name: aicandlez-db
    plan: free
    region: oregon
    databaseName: aicandlez