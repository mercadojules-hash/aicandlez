services:
  # ── API Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: aicandlez-api
    env: node
    region: oregon
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/api-server run build
    startCommand: >
      pnpm --filter @workspace/api-server run migrate &&
      pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aicandlez-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PROXY_URL
        value: https://api.aicandlez.com/api/__clerk
      - key: SESSION_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hello@aicandlez.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: CRYPTOCOM_API_KEY
        sync: false
      - key: CRYPTOCOM_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://aicandlez.com,https://www.aicandlez.com,https://app.aicandlez.com
      - key: EXCHANGE_LIVE_ENABLED
        value: "false"

  # ── Trading Dashboard / Desktop Terminal (static) ────────────────────────────
  - type: web
    name: aicandlez-dashboard
    env: static
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/trading-dashboard run build
    staticPublishPath: artifacts/trading-dashboard/dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PROXY_URL
        value: https://api.aicandlez.com/api/__clerk
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.aicandlez.com
      - key: VITE_WS_URL
        value: wss://api.aicandlez.com/ws

  # ── Mobile PWA (static) ──────────────────────────────────────────────────────
  - type: web
    name: aicandlez-app
    env: static
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/aicandlez-app run build
    staticPublishPath: artifacts/aicandlez-app/dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PROXY_URL
        value: https://api.aicandlez.com/api/__clerk
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://api.aicandlez.com

  # ── Marketing Landing (static) ───────────────────────────────────────────────
  - type: web
    name: aicandlez-landing
    env: static
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/landing run build
    staticPublishPath: artifacts/landing/dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_URL
        value: https://app.aicandlez.com

databases:
  - name: aicandlez-db
    plan: starter
    region: oregon
    databaseName: aicandlez