# Weekly broker-fee drift smoke test.
#
# Runs `adapterFeeParsingTestnet.test.ts` against each exchange's public
# sandbox so a silent field rename — or a promo tier that pays fees in a
# different asset — gets caught long before it lands on a paying customer's
# trade receipt as `source: "estimate"`.
#
# Currently verified-green sandboxes wired in below:
#   - Binance Spot Testnet   (BINANCE_TESTNET_*)
#   - Gemini Sandbox         (GEMINI_SANDBOX_*)
#   - Gate.io Spot Testnet   (GATEIO_TESTNET_*)
#   - Phemex Testnet         (PHEMEX_TESTNET_*)
#   - Bitget Demo Trading    (BITGET_DEMO_*)
#
# Documented coverage gaps for BingX, HTX, Crypto.com,
# Kraken Spot, and Coinbase Advanced Trade live as
# `describe.skip` placeholders inside `adapterFeeParsingTestnet.test.ts`
# (see the broker coverage matrix at the top of that file). Secrets for
# those brokers are intentionally NOT wired here — that prevents the
# weekly job from accidentally placing live orders if a credential
# lands in GitHub Secrets before the matching adapter work is done.
# Once a gap's blocker is resolved, flip its block from `describe.skip`
# to `describe.skipIf(...)` and add the matching `*_TESTNET_*` secrets
# to the env: block below in the same change.
#
# Per-exchange testnet credentials live in GitHub Actions secrets and are
# expected to be funded with a few dollars of testnet quote currency. The
# job is non-blocking for PRs: it only runs on the weekly schedule and on
# manual dispatch.
#
# On failure, the job pings the operator command center via
# COMMAND_CENTER_ALERT_WEBHOOK so the on-call operator sees the drift
# without having to read the Actions tab.

name: Exchange testnet fee parsing

on:
  schedule:
    # 09:00 UTC every Monday — quiet hour across major exchange ops windows.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  testnet-fees:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUN_EXCHANGE_TESTNET:        "1"
      BINANCE_TESTNET_API_KEY:     ${{ secrets.BINANCE_TESTNET_API_KEY }}
      BINANCE_TESTNET_API_SECRET:  ${{ secrets.BINANCE_TESTNET_API_SECRET }}
      GEMINI_SANDBOX_API_KEY:      ${{ secrets.GEMINI_SANDBOX_API_KEY }}
      GEMINI_SANDBOX_API_SECRET:   ${{ secrets.GEMINI_SANDBOX_API_SECRET }}
      GATEIO_TESTNET_API_KEY:      ${{ secrets.GATEIO_TESTNET_API_KEY }}
      GATEIO_TESTNET_API_SECRET:   ${{ secrets.GATEIO_TESTNET_API_SECRET }}
      PHEMEX_TESTNET_API_KEY:      ${{ secrets.PHEMEX_TESTNET_API_KEY }}
      PHEMEX_TESTNET_API_SECRET:   ${{ secrets.PHEMEX_TESTNET_API_SECRET }}
      BITGET_DEMO_API_KEY:         ${{ secrets.BITGET_DEMO_API_KEY }}
      BITGET_DEMO_API_SECRET:      ${{ secrets.BITGET_DEMO_API_SECRET }}
      BITGET_DEMO_PASSPHRASE:      ${{ secrets.BITGET_DEMO_PASSPHRASE }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run exchange testnet fee parsing
        id: testnet
        run: |
          pnpm --filter @workspace/api-server run test -- adapterFeeParsingTestnet

      - name: Notify operator command center on failure
        if: failure() && env.COMMAND_CENTER_ALERT_WEBHOOK != ''
        env:
          COMMAND_CENTER_ALERT_WEBHOOK: ${{ secrets.COMMAND_CENTER_ALERT_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS -X POST "$COMMAND_CENTER_ALERT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"severity\":\"high\",\"source\":\"exchange-testnet-fees\",\"message\":\"Broker-fee parsing regressed against an exchange sandbox\",\"runUrl\":\"$RUN_URL\"}"
